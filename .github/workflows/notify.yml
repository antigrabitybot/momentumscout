# 買い候補スコアのDiscord通知 (手動実行用)
#
# 通常の通知は daily.yml がデータ更新の直後 (平日17時頃) に自動送信するため、
# このワークフローは Actions → score-notify → Run workflow での手動テスト・
# 再通知専用。朝の定時再通知を復活させたい場合は下の schedule: を
# コメント解除して時刻 (UTC表記。JST-9時間) を設定する。
name: score-notify

on:
  # schedule:
  #   - cron: "30 23 * * 0-4"   # 8:30 JST 平日朝
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send score notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SCORE_MIN: "5"
        run: python score_notify.py
